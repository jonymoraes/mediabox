name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Permisos explícitos para que la acción haga el push de los .svg
    permissions:
      contents: write

    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-workspace

      - name: Run Build
        # Generamos el build para validar que el código compila (Badge: Build)
        run: pnpm run build

      - name: Run Tests
        # Forzamos json-summary para que la acción de badges tenga datos
        run: pnpm test:cov --coverageReporters="json-summary" --coverageReporters="text"
        env:
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Generate All Badges
        # Solo generamos badges en push a ramas principales, no en cada PR (evita ruido)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: jpb06/jest-badges-action@v2.1.0
        with:
          coverage-summary-path: ./coverage/coverage-summary.json
          no-pnpm: false
