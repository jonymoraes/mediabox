name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-workspace

      - name: Run Tests
        # Quitamos la basura del CLI. Tu package.json ya tiene los reporters.
        # Usamos 'tee' para capturar el output y extraer los tests pasados.
        run: pnpm test:cov | tee test-output.txt
        env:
          NODE_ENV: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Generate Coverage Badges
        run: |
          # Crear carpeta si no existe
          mkdir -p ./badges

          # Generar las de coverage (ya configurado en tu package.json)
          npx jest-coverage-badges --input ./coverage/coverage-summary.json --output ./badges

          # Extraer el número real de tests pasados (ej. "241")
          PASSED=$(grep -oP '\d+(?=\s+passed)' test-output.txt | head -n 1)
          if [ -z "$PASSED" ]; then PASSED="0"; fi

          # Generar badge de tests real
          curl -L "https://img.shields.io/badge/tests-${PASSED}%20passed-brightgreen.svg" -o ./badges/tests.svg

      - name: Commit and Push Badges
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ./badges/*.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update coverage badges [skip ci]" && git push)
